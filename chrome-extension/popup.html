<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skimly</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Loading State -->
    <div id="loading" class="screen active">
      <div class="spinner"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="header">
        <div class="logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2E5C55" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <span>Skimly</span>
        </div>
      </div>
      <div class="content">
        <h2>Welcome to Skimly</h2>
        <p>Sign in to start capturing knowledge from any webpage.</p>
        <button id="login-btn" class="btn primary">Sign In</button>
        <button id="signup-btn" class="btn secondary">Create Account</button>
      </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
      <div class="header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2E5C55" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <span>Skimly</span>
        </div>
        <div class="user-menu">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn-icon" title="Sign Out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="content">
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-today">0</span>
            <span class="stat-label">Today</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="stat-remaining">10</span>
            <span class="stat-label">Left</span>
          </div>
        </div>
        <div class="tip">
          <strong>Tip:</strong> Select text on any webpage and click the Skimly button or press <kbd>Ctrl+Shift+S</kbd>
        </div>
        <button id="open-dashboard" class="btn primary">Open Dashboard</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
